name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc libc6-dev \
            libx11-dev libxtst-dev libxkbcommon-dev libxi-dev \
            libgl1-mesa-dev libxcursor-dev libxinerama-dev libxrandr-dev \
            libxxf86vm-dev libasound2-dev pkg-config \
            libwayland-dev wayland-protocols libegl-dev libgles-dev

      - name: Formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
